name: CI

# Build and test on every push to main and on every pull request targeting it.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # Cache the NuGet package cache keyed on the project files so restores
      # are fast and only re-download when a dependency actually changes.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'nuget.config') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Falck.sln

      - name: Build (Release, warnings as errors)
        run: dotnet build Falck.sln -c Release --no-restore -warnaserror

      - name: Test with coverage
        run: >
          dotnet test Falck.sln
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings

      # Keep the test results and coverage as build artifacts for inspection.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
