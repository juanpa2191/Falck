name: CI

# Compila y prueba en cada push a main y en cada pull request dirigido a main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela una ejecución en curso cuando se hace push de un commit más nuevo al mismo ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      # Cachea los paquetes NuGet usando los archivos de proyecto como clave para
      # que las restauraciones sean rápidas y solo se re-descarguen cuando una
      # dependencia realmente cambie.
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'nuget.config') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Falck.sln

      - name: Build (Release, warnings as errors)
        run: dotnet build Falck.sln -c Release --no-restore -warnaserror

      - name: Test with coverage
        run: >
          dotnet test Falck.sln
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings

      # Conserva los resultados de pruebas y la cobertura como artefactos para inspección.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
