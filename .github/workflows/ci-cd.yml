name: Integración y Entrega Continua (CI/CD)

# Un solo pipeline con compuerta (gate): primero corre las pruebas y solo si
# pasan se construye/publica la imagen Docker.
#  - pull_request  -> pruebas + build de imagen SIN push (valida el Dockerfile).
#  - push a main    -> pruebas -> si verde, build + push a GHCR (:latest, :sha-<corto>).
#  - tag v*.*.*     -> pruebas -> si verde, build + push a GHCR (:vX.Y.Z).
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancela una ejecución en curso cuando llega un commit más nuevo al mismo ref.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  # ghcr.io/<owner>/<repo> — la action de metadata lo pasa a minúsculas.
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v7

      - name: Instalar .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      # Cachea los paquetes NuGet usando los archivos de proyecto como clave.
      - name: Cachear paquetes NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'nuget.config') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restaurar dependencias
        run: dotnet restore Falck.sln

      - name: Compilar (Release, warnings como errores)
        run: dotnet build Falck.sln -c Release --no-restore -warnaserror

      - name: Ejecutar pruebas con cobertura
        run: >
          dotnet test Falck.sln
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings

      - name: Subir resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

  build-image:
    name: Construir imagen
    # Compuerta: solo se ejecuta si el job de pruebas terminó en verde.
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # necesario para publicar en GHCR con GITHUB_TOKEN
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v7

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login (y por tanto push) solo fuera de los pull requests.
      - name: Autenticar en GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Deriva tags/labels: :latest para main, :sha-<corto> siempre, :vX.Y.Z en tags.
      - name: Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # En pull_request construye la imagen para validar el Dockerfile (push=false);
      # en push a main/tags la publica en GHCR (push=true).
      - name: Construir y (condicionalmente) publicar
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
