# Ejecuta la API junto a un contenedor de SQL Server. La app apunta a SQL Server
# LocalDB por defecto (Windows); en contenedores la cadena de conexión se
# sobrescribe aquí para apuntar al servicio "db". Levanta todo con:
#   docker compose up --build
# y luego abre http://localhost:8080/swagger
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # La API espera a que esto pase antes de arrancar (ver depends_on abajo).
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"      # habilita Swagger para el evaluador
      ASPNETCORE_URLS: "http://+:8080"
      # Sobrescribe ConnectionStrings:DefaultConnection de appsettings.json.
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=FalckEmployeesDb;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True"
      # Sobrescribe Jwt:Key; en cualquier despliegue real, suministra aquí un secreto real.
      Jwt__Key: "docker-compose-dev-signing-key-0123456789ABCDEF0123456789ABCDEF"
    ports:
      - "8080:8080"

volumes:
  mssql-data:
