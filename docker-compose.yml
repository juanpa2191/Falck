# Runs the API together with a SQL Server container. The app targets SQL Server
# LocalDB by default (Windows); in containers the connection string is overridden
# here to point at the "db" service. Start everything with:
#   docker compose up --build
# then open http://localhost:8080/swagger
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # API waits for this to pass before starting (see depends_on below).
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"      # enables Swagger for the reviewer
      ASPNETCORE_URLS: "http://+:8080"
      # Overrides ConnectionStrings:DefaultConnection from appsettings.json.
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=FalckEmployeesDb;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True"
      # Overrides Jwt:Key; supply a real secret here in any real deployment.
      Jwt__Key: "docker-compose-dev-signing-key-0123456789ABCDEF0123456789ABCDEF"
    ports:
      - "8080:8080"

volumes:
  mssql-data:
